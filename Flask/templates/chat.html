<!-- templates/chat.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채팅 — 스마트 컨베이어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#1d4ed8;--primary-hover:#1e40af;
  --navy:#1e3a5f;
  --text:#111827;--text-sec:#6b7280;--text-muted:#9ca3af;
  --border:#e5e7eb;--border-light:#f3f4f6;--bg:#f3f4f6;--white:#fff;
  --danger:#dc2626;--success:#16a34a;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07);
}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px;overflow:hidden;}

.navbar{background:var(--navy);height:56px;display:flex;align-items:center;padding:0 28px;gap:0;flex-shrink:0;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:32px;}
.nav-brand-icon{width:30px;height:30px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.nav-brand-icon svg{width:17px;height:17px;fill:white;}
.nav-brand-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;white-space:nowrap;}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;}
.nav-link{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap;}
.nav-link:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-link.active{background:rgba(255,255,255,.13);color:#fff;}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.nav-user{font-size:13px;color:rgba(255,255,255,.5);}
.nav-logout{font-size:13px;color:rgba(255,255,255,.4);text-decoration:none;transition:color .15s;}
.nav-logout:hover{color:#fff;}
.btn-emergency{display:flex;align-items:center;gap:6px;background:#dc2626;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-emergency:hover{background:#b91c1c;}
.btn-emergency svg{width:14px;height:14px;fill:white;flex-shrink:0;}

.page-content{flex:1;padding:28px 32px;max-width:1100px;width:100%;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;}
.page-header{margin-bottom:20px;}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.4px;}
.page-subtitle{font-size:13px;color:var(--text-sec);margin-top:3px;}

/* CHAT LAYOUT */
.chat-layout{display:flex;gap:0;background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);flex:1;min-height:0;}

/* SIDEBAR */
.chat-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);}
.sidebar-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;}
.contact-list{flex:1;overflow-y:auto;}
.contact-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border-light);}
.contact-item:hover{background:#fafafa;}
.contact-item.active{background:var(--primary);color:white;}
.contact-item.active .contact-name{color:white;}
.contact-item.active .contact-role{color:rgba(255,255,255,.7);}
.contact-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-role{font-size:11px;color:var(--text-muted);}
.contact-badge{background:var(--danger);color:white;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* CHAT MAIN */
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--white);}
.chat-header-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;background:#dbeafe;color:var(--primary);flex-shrink:0;}
.chat-header-name{font-size:14px;font-weight:700;color:var(--text);}
.chat-header-status{font-size:12px;color:var(--success);display:flex;align-items:center;gap:4px;}
.chat-header-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--status-color, #9ca3af);display:inline-block;}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:#fafafa;}
.msg-group{display:flex;gap:10px;align-items:flex-end;max-width:70%;}
.msg-group.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-group.mine{margin-right:0;gap:6px;}

/* 내 메시지 말풍선 더 카톡처럼 */
.msg-group.mine .msg-bubble{background:var(--primary);color:white;border-radius:16px 16px 4px 16px;padding:10px 14px;}

/* 시간/읽음 오른쪽 정렬 */
.msg-group.mine .msg-meta{justify-content:flex-end;}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.msg-group.mine .msg-avatar{display:none;}
.msg-body{display:flex;flex-direction:column;gap:3px;}
.msg-group.mine .msg-body{align-items:flex-end;}
.msg-sender{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:2px;}
.msg-bubble{padding:9px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg-group:not(.mine) .msg-bubble{background:var(--white);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg-bubble:has(.msg-emoticon){background:transparent !important;border:none !important;padding:0 !important;}
.msg-bubble:has(.msg-image){background:transparent !important;border:none !important;padding:0 !important;}
.msg-bubble:has(.msg-file-link){background:transparent !important;border:none !important;padding:0 !important;}
.msg-time{font-size:10px;color:var(--text-muted);}
.msg-read{font-size:10px;color:var(--primary);font-weight:500;}
.msg-unread-count{font-size:10px;color:var(--warning);font-weight:600;}
.msg-meta{display:flex;align-items:center;gap:6px;}

/* SYSTEM MSG */
.msg-system{display:inline-block;margin:8px auto;padding:6px 14px;font-size:12px;font-weight:500;background:#eef3ff;color:#2f5cff;border-radius:20px;text-align:center;}
/* INPUT */
.chat-input-area{padding:14px 16px;border-top:1px solid var(--border);background:var(--white);display:flex;align-items:center;gap:10px;}
.chat-recipient{padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);outline:none;background:var(--white);min-width:130px;}
.chat-recipient:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.1);}
.chat-text-input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
.chat-text-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.1);}
.btn-send{display:flex;align-items:center;gap:6px;background:var(--primary);color:white;border:none;padding:9px 16px;border-radius:7px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-send:hover{background:var(--primary-hover);}
.btn-send svg{width:15px;height:15px;fill:white;}
.btn-file{display:flex;align-items:center;justify-content:center;background:var(--white);border:1px solid var(--border);padding:8px;border-radius:7px;cursor:pointer;transition:background .15s;}
.btn-file:hover{background:var(--bg);}

/* 채팅 이미지/파일 */
.msg-image{max-width:240px;max-height:200px;border-radius:10px;cursor:pointer;margin-top:4px;}
.msg-image:hover{opacity:.9;}
.msg-file-link{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--primary);text-decoration:none;margin-top:4px;cursor:pointer;}
.msg-file-link:hover{background:#e5e7eb;}
.msg-file-link svg{width:16px;height:16px;fill:var(--primary);flex-shrink:0;}

/* 이미지 모달 */
.img-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;cursor:pointer;}
.img-modal.show{display:flex;}
.img-modal img{max-width:90%;max-height:90%;border-radius:8px;}

/* 이모티콘 패널 */
.emo-panel{display:none;position:absolute;right:20px;bottom:80px;width:360px;height:auto;max-height:650px;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.2);overflow:hidden;z-index:999;}
.emo-panel.show{display:block;}
.chat-main{position:relative;}
.emo-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;}
.emo-tab{padding:8px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text-muted);font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;}
.emo-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
.emo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px;overflow-y:auto;max-height:520px;}
.emo-item{width:100%;height:110px;cursor:pointer;border-radius:8px;padding:4px;transition:background .1s;}
.emo-item:hover{background:var(--bg);}
.emo-item img{width:100%;height:100%;object-fit:contain;}

/* 프로필 모달 */
.pro-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:350;align-items:center;justify-content:center;}
.pro-modal.show{display:flex;}
.pro-modal-content{background:var(--white);border-radius:12px;padding:20px;width:360px;max-width:90vw;}
.pro-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-weight:600;font-size:15px;}
.pro-modal-close{cursor:pointer;font-size:18px;color:var(--text-muted);}
.pro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.pro-item{width:100%;aspect-ratio:1;cursor:pointer;border-radius:50%;overflow:hidden;border:3px solid transparent;transition:border-color .15s;}
.pro-item:hover{border-color:var(--primary);}
.pro-item.selected{border-color:var(--primary);}
.pro-item img{width:100%;height:100%;object-fit:cover;}

/* 이모티콘 메시지 */
.msg-emoticon{width:120px;height:120px;margin-top:4px;}

/* 프로필 이미지 아바타 */
.msg-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

/* 프로필 변경 버튼 (내 아바타) */
.my-profile-btn{cursor:pointer;position:relative;}
.my-profile-btn:hover::after{content:'변경';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--primary);white-space:nowrap;}

/* 우클릭 메뉴 */
.ctx-menu{display:none;position:fixed;z-index:400;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);padding:4px 0;min-width:120px;}
.ctx-menu.show{display:block;}
.ctx-menu-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background .1s;}
.ctx-menu-item:hover{background:var(--bg);}
.ctx-menu-item.danger{color:var(--danger);}
.ctx-menu-item.danger:hover{background:#fef2f2;}
.ctx-menu-item svg{width:14px;height:14px;flex-shrink:0;}

#alert-area{position:fixed;top:68px;right:20px;z-index:200;width:340px;display:flex;flex-direction:column;gap:8px;}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:8px;font-size:13px;box-shadow:0 4px 6px -1px rgba(0,0,0,.07);background:var(--white);border:1px solid var(--border);}
.alert-danger{border-left:3px solid var(--danger);}

@media(max-width:650px){.chat-sidebar{display:none;}.page-content{padding:16px;}}

/* 설정 버튼 - 사이드바 하단 */
.sidebar-footer{padding:8px 8px;}
.btn-settings-bottom{font-size:21px;cursor:pointer;opacity:.45;transition:opacity .15s;user-select:none;line-height:1;}
.btn-settings-bottom:hover{opacity:1;}

/* 설정 모달 */
.settings-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;}
.settings-modal.show{display:flex;}
.settings-content{background:var(--white);border-radius:14px;padding:24px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.settings-header h3{font-size:16px;font-weight:700;}
.settings-close{cursor:pointer;font-size:20px;color:var(--text-muted);background:none;border:none;}
.settings-section{margin-bottom:24px;}
.settings-section-title{font-size:13px;font-weight:700;color:var(--text-sec);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.theme-options{display:flex;gap:10px;flex-wrap:wrap;}
.theme-option{width:48px;height:48px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s;position:relative;}
.theme-option:hover{transform:scale(1.1);}
.theme-option.active{border-color:var(--primary);transform:scale(1.1);}
.theme-option .check{display:none;position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--primary);border-radius:50%;color:white;font-size:10px;align-items:center;justify-content:center;}
.theme-option.active .check{display:flex;}

/* 테마: 다크 */
[data-theme="dark"]{
  --primary:#3b82f6;--primary-hover:#2563eb;
  --text:#e5e7eb;--text-sec:#9ca3af;--text-muted:#6b7280;
  --border:#374151;--border-light:#1f2937;--bg:#111827;--white:#1f2937;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow:0 4px 6px rgba(0,0,0,.3);
}
[data-theme="dark"] .navbar{background:#0f172a;}
[data-theme="dark"] .chat-messages{background:#111827;}
[data-theme="dark"] .msg-group:not(.mine) .msg-bubble{background:#374151;color:#e5e7eb;border-color:#4b5563;}
[data-theme="dark"] .msg-system{background:#1e3a5f;color:#93c5fd;}
[data-theme="dark"] .contact-item:hover{background:#374151;}
[data-theme="dark"] .emo-panel{background:#1f2937;border-color:#374151;}
[data-theme="dark"] .emo-item:hover{background:#374151;}
[data-theme="dark"] .pro-modal-content,.settings-content{background:#1f2937;color:#e5e7eb;}
[data-theme="dark"] .chat-text-input,[data-theme="dark"] .chat-recipient{background:#374151;color:#e5e7eb;border-color:#4b5563;}

/* 테마: 핑크 */
[data-theme="pink"]{
  --primary:#ec4899;--primary-hover:#db2777;
  --bg:#fdf2f8;--border:#fbcfe8;--border-light:#fce7f3;
}
[data-theme="pink"] .navbar{background:#9d174d;}
[data-theme="pink"] .chat-messages{background:#fdf2f8;}
[data-theme="pink"] .msg-group.mine .msg-bubble{background:#ec4899;}
[data-theme="pink"] .msg-system{background:#fce7f3;color:#be185d;}
[data-theme="pink"] .contact-item.active{background:#ec4899;}

/* 테마: 그린 */
[data-theme="green"]{
  --primary:#16a34a;--primary-hover:#15803d;
  --bg:#f0fdf4;--border:#bbf7d0;--border-light:#dcfce7;
}
[data-theme="green"] .navbar{background:#14532d;}
[data-theme="green"] .chat-messages{background:#f0fdf4;}
[data-theme="green"] .msg-group.mine .msg-bubble{background:#16a34a;}
[data-theme="green"] .msg-system{background:#dcfce7;color:#166534;}
[data-theme="green"] .contact-item.active{background:#16a34a;}
</style>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="/dashboard" class="nav-brand">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
    </div>
    <span class="nav-brand-name">스마트 컨베이어 관제</span>
  </a>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link">대시보드</a>
    <a href="/defect" class="nav-link">불량 확인</a>
    <a href="/members" class="nav-link">회원 관리</a>
    <a href="/monitor" class="nav-link">모니터링</a>
    <a href="/chat" class="nav-link active">채팅</a>
  </div>
  <div class="nav-right">
    <span class="nav-user">{{ user_name }} ({{ user_id }})</span>
    <a href="/logout" class="nav-logout">로그아웃</a>
    <button class="btn-emergency" onclick="emergencyStop()">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      비상정지
    </button>
  </div>
</nav>

<div id="alert-area"></div>
<div class="img-modal" id="imgModal" onclick="this.classList.remove('show')">
  <img id="imgModalSrc" src="">
</div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-menu-item" onclick="deleteForMe()">
    삭제
  </div>
  <div class="ctx-menu-item danger" id="deleteForAllMenu" onclick="deleteForAll()">
    모두에게서 삭제
  </div>
</div>

<div class="page-content">
  <div class="page-header">
    <div class="page-title">채팅</div>
    <div class="page-subtitle">내부 직원 간 메시지</div>
  </div>

  <div class="chat-layout">
  <div class="chat-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">대화 상대</div>
    </div>
    <div class="contact-list" id="contact-list"></div>
    <div class="sidebar-footer">
      <span class="btn-settings-bottom" onclick="openSettingsModal()" title="설정">⚙️</span>
    </div>
  </div>

  <div class="chat-main">
    <div class="chat-header">
      <div class="chat-header-avatar" id="chat-avatar">
        나
      </div>
      <div>
        <div class="chat-header-name" id="chat-name">나</div>
        <div class="chat-header-status" id="chat-status">오프라인</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">

        <input type="date" id="chat-date-filter"
          style="padding:5px 10px;border:1px solid var(--border);
                border-radius:6px;font-size:12px;font-family:inherit;color:var(--text);outline:none;"
          onchange="filterByDate()">

        <button onclick="clearDateFilter()"
          style="padding:5px 10px;border:1px solid var(--border);
                border-radius:6px;font-size:12px;background:var(--white);cursor:pointer;">
          전체
        </button>

      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="msg-system">채팅을 시작하세요</div>
    </div>

    <div class="chat-input-area">
      <select class="chat-recipient" id="recipient">
        <option value="">수신자 선택</option>
        <option value="all">전체</option>
      </select>
      <input class="chat-text-input" id="msgInput" type="text" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter') sendMsg()">
      <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.hwp" onchange="sendFile()">

<script>
function sendMsg() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  const receiverId = document.getElementById('recipient').value;

  if (!receiverId) {
    alert('수신자를 선택하세요.');
    return;
  }

  if (!msg) return;

  socket.emit('chat_message', {
    receiver_id: receiverId,
    message: msg
  });

  input.value = '';
}

// ★ 파일 전송
function sendFile() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  if (!file) return;

  const receiverId = document.getElementById('recipient').value;
  if (!receiverId) {
    alert('수신자를 선택하세요.');
    fileInput.value = '';
    return;
  }

  // 16MB 제한
  if (file.size > 16 * 1024 * 1024) {
    alert('파일 크기는 16MB 이하만 가능합니다.');
    fileInput.value = '';
    return;
  }

  const formData = new FormData();
  formData.append('file', file);
  formData.append('receiver_id', receiverId);

  fetch('/api/chat/upload', {
    method: 'POST',
    body: formData
  })
  .then(r => r.json())
  .then(data => {
    if (data.status !== 'ok') {
      alert('파일 전송 실패: ' + (data.message || ''));
    }
  })
  .catch(err => {
    console.error('파일 업로드 오류:', err);
    alert('파일 전송 중 오류가 발생했습니다.');
  });

  fileInput.value = '';
}

function toggleEmoPanel() {
  const panel = document.getElementById('emoPanel');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    return;
  }
  panel.classList.add('show');
  loadEmo('gamjeong');
}

function loadEmo(category) {
  document.querySelectorAll('.emo-tab').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.emo-tab[onclick="loadEmo('${category}')"]`).classList.add('active');

  fetch(`/api/emoticons/${category}`)
    .then(res => res.json())
    .then(data => {
      const grid = document.getElementById('emoGrid');
      grid.innerHTML = '';

      data.forEach(src => {
        const div = document.createElement('div');
        div.className = 'emo-item';
        div.innerHTML = `<img src="${src}">`;
        div.onmouseenter = () => div.style.transform = 'scale(1.6)';
        div.onmouseleave = () => div.style.transform = 'scale(1)';
        div.onclick = () => sendEmoticon(src);
        grid.appendChild(div);
      });
    });
}


function sendEmoticon(src) {
  const receiverId = document.getElementById('recipient').value;
  if (!receiverId) { alert('수신자를 선택하세요.'); return; }

  socket.emit('chat_message', {
    receiver_id: receiverId,
    message: '[EMO]' + src
  });

  document.getElementById('emoPanel').classList.remove('show');
}

function deleteForMe() {

  const msgId = _selectedMsgEl.getAttribute('data-msg-id');
  if (!msgId) {
    alert('메시지 ID가 없습니다.');
    return;

  fetch('/api/chat/delete_for_me', {

    headers: {'Content-Type': 'application/json'},

  .then(data => {

// 최근 메시지 시간 추적 (연락 온 순서 정렬용)
let contactLastMsg = {};

function moveContactToTop(userId) {
  contactLastMsg[userId] = Date.now();
  const list = document.getElementById('contact-list');
  const items = list.querySelectorAll('.contact-item[data-user-id]');
  const target = Array.from(items).find(el => el.getAttribute('data-user-id') === userId);
  if (!target) return;

  // "나" 항목 다음에 삽입
  const meItem = list.querySelectorAll('.contact-item:not([data-user-id])');
  const insertAfter = meItem[meItem.length - 1]; // 마지막 고정 항목 (나)
  if (insertAfter && insertAfter.nextSibling) {
    list.insertBefore(target, insertAfter.nextSibling);
  }
}

socket.on('receive_message', function(data) {
  const selectedId = document.getElementById('recipient').value;

  // 연락처 최신순 이동
  if (data.sender_id !== currentUserId && data.sender_id !== 'system') {

  } else if (data.receiver_id !== 'all' && data.receiver_id !== currentUserId) {
    moveContactToTop(data.receiver_id);
  }

  // 전체공지 또는 1:1 메시지 판별
  const isThisRoom =
    (data.receiver_id === 'all' && selectedId === 'all') ||
    (data.sender_id === currentUserId && data.receiver_id === selectedId) ||
    (data.sender_id === selectedId && data.receiver_id === currentUserId);

  if (isThisRoom) {
  addMessageToScreen(data);

  // 현재 보고 있는 채팅방이면 바로 읽음 처리
  if (data.sender_id !== currentUserId) {

    unreadCounts[data.sender_id] = 0;
    const activeItem = document.querySelector('.contact-item.active');

      if (badge) badge.remove();
    }

}
else {
  const fromId = data.receiver_id === 'all' ? 'all' : data.sender_id;

  if (data.receiver_id === 'all') {
    unreadCounts[fromId] = data.read_status ? Number(data.read_status) : 0;

    unreadCounts[fromId] = (unreadCounts[fromId] || 0) + 1;
  }

}

  const selectedId = document.getElementById('recipient').value;
  if (data.reader_id === selectedId || selectedId === 'all') {
    // 읽음 표시만 업데이트
    document.querySelectorAll('.msg-group.mine .msg-unread-count').forEach(el => {
      el.className = 'msg-read';
      el.textContent = '읽음';
    });
    document.querySelectorAll('.msg-group.mine .msg-read').forEach(el => {
      el.textContent = '읽음';
    });
  }
});

// 서버에서 미읽은 수 수신 (페이지 진입 시 + 실시간)
socket.on('unread_update', function(data) {
  if (data.target_user !== currentUserId) return;

  const selectedId = document.getElementById('recipient').value;
  const unread = data.unread || {};

  for (const [senderId, count] of Object.entries(unread)) {
    if (senderId === selectedId || senderId === currentUserId) {
      unreadCounts[senderId] = 0;
      updateBadge(senderId);
      socket.emit('mark_read', { sender_id: senderId });
      continue;
    }

    unreadCounts[senderId] = count;
    updateBadge(senderId);
  }
});

socket.on('profile_updated', function(data){
  // 연락처 목록만 갱신 (현재 선택 유지)
  const selectedId = document.getElementById('recipient').value;
  const selectedName = document.getElementById('chat-name').textContent;
  
  fetch('/api/members').then(r => r.json()).then(mdata => {
    const members = Array.isArray(mdata) ? mdata : (mdata.members || []);
    // 사이드바 아바타만 갱신
    members.forEach(m => {
      const item = document.querySelector(`.contact-item[data-user-id="${m.id}"]`);
      if (item && m.profile_img) {
        const avatar = item.querySelector('.contact-avatar');
        if (avatar) avatar.innerHTML = `<img src="${m.profile_img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      }
    });
    // 내 프로필 갱신
    const me = members.find(m => m.id === currentUserId);
    if (me && me.profile_img) {
      _myProfile = me.profile_img;
      const meItem = document.querySelector('.contact-item.active');
      if (meItem && selectedId === currentUserId) {
        const avatar = meItem.querySelector('.contact-avatar');
        if (avatar) avatar.innerHTML = `<img src="${me.profile_img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      }
    }
  });
});

function updateBadge(userId) {
  document.querySelectorAll('.contact-item').forEach(el => {
    const onclick = el.getAttribute('onclick');
    if (!onclick) return;

    if (onclick.includes(`'${userId}'`)) {
      let badge = el.querySelector('.contact-badge');

      // 👉 0이면 뱃지 삭제
      if (!unreadCounts[userId] || unreadCounts[userId] <= 0) {
        if (badge) badge.remove();
        return;
      }

      if (!badge) {
        badge = document.createElement('div');
        badge.className = 'contact-badge';
        el.appendChild(badge);
      }

      badge.textContent = unreadCounts[userId];
    }
  });
}



function addMessageToScreen(data) {
  const isMine = data.sender_id === currentUserId;
  const container = document.getElementById('chat-messages');
  if (data.sender_id === 'system') {
    const notice = document.createElement('div');
    notice.className = 'msg-system';
    notice.textContent = data.message;
    container.appendChild(notice);
    container.scrollTop = container.scrollHeight;
    return;
  }

  if (data.date_key && window.lastDateKey !== data.date_key) {
    const dateDiv = document.createElement('div');
    dateDiv.className = 'msg-system';
    dateDiv.textContent = '📅 ' + data.date_label;
    container.appendChild(dateDiv);
    window.lastDateKey = data.date_key;
  }

  const el = document.createElement('div');
  el.className = isMine ? 'msg-group mine' : 'msg-group';
  if (data.id) el.setAttribute('data-msg-id', data.id);



// ★ 파일/이미지/이모티콘 콘텐츠 생성
let contentHtml = '';
const isEmoticon = data.message && data.message.startsWith('[EMO]');

if (isEmoticon) {
  const emoSrc = data.message.replace('[EMO]', '');
  contentHtml = `
    <div class="msg-bubble">
      <img class="msg-emoticon" src="${emoSrc}">
    </div>`;
}
else if (data.file_type === 'image' && data.file_path) {
  contentHtml = `
    <div class="msg-bubble">
      <img class="msg-image" src="${data.file_path}" 
           onclick="showImageModal('${data.file_path}')">
    </div>`;
}
else if (data.file_type === 'file' && data.file_path) {
  contentHtml = `
    <div class="msg-bubble">
      <a class="msg-file-link" href="${data.file_path}" download="${data.file_name}" target="_blank">
        📎 ${data.file_name || '파일 다운로드'}
      </a>
    </div>`;
}
else {
  contentHtml = `<div class="msg-bubble">${data.message}</div>`;
}

  // ★ 읽음 상태 표시
  let readHtml = '';
  if (isMine && data.read_status) {
    if (data.read_status === '읽음') {
      readHtml = `<span class="msg-read">읽음</span>`;
    } else {
      // 전체공지: 안 읽은 수
      readHtml = `<span class="msg-unread-count">${data.read_status}</span>`;
    }
  }

  // ★ 아바타: 프로필 이미지가 있으면 이미지, 없으면 글자
  const profileSrc = data.sender_profile || (isMine ? _myProfile : '');
  let avatarHtml = '';
  if (profileSrc) {
    avatarHtml = `<div class="msg-avatar ${isMine ? 'my-profile-btn' : ''}" ${isMine ? 'onclick="openProfileModal()"' : ''}><img src="${profileSrc}"></div>`;
  } else {
    avatarHtml = `<div class="msg-avatar ${isMine ? 'my-profile-btn' : ''}" style="background:${isMine ? '#1d4ed8' : '#dbeafe'};color:${isMine ? 'white' : '#1d4ed8'}" ${isMine ? 'onclick="openProfileModal()"' : ''}>${isMine ? '나' : (data.sender_name || data.sender_id)[0]}</div>`;
  }

  el.innerHTML = `
    ${avatarHtml}
    <div class="msg-body">
      ${isMine ? '' : `<div class="msg-sender">${data.sender_name || data.sender_id}</div>`}
      ${contentHtml}
      <div class="msg-meta">
        ${readHtml}
        <span class="msg-time">${data.timestamp}</span>
      </div>
    </div>
  `;

  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

let currentChatId = null;

function loadChatHistory(peerId, dateStr) {
  // 🔥 peerId + 날짜 기준으로 비교
  const key = peerId + (dateStr || '');

  if (currentChatId === key) return;
  currentChatId = key;

  const container = document.getElementById('chat-messages');

  // 🔥 이미 메시지 있으면 "불러오는 중" 안 띄움
  if (!container.dataset.loaded) {
    container.innerHTML = '<div class="msg-system">불러오는 중...</div>';
  }

  let url = `/api/chat/history/${peerId}`;
  if (dateStr) url += `?date=${dateStr}`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.status !== 'ok') return;

      container.dataset.loaded = 'true'; // 🔥 로딩 완료 표시

      if (data.messages.length === 0) {
        container.innerHTML = '<div class="msg-system">' +
          (dateStr ? dateStr + ' 대화 내역이 없습니다' : '채팅을 시작하세요') +
          '</div>';
        return;
      }

      container.innerHTML = '';
      window.lastDateKey = null;
      data.messages.forEach(msg => addMessageToScreen(msg));
    });
}

function filterByDate() {
  const dateStr = document.getElementById('chat-date-filter').value;
  const peerId = document.getElementById('recipient').value;
  if (peerId) {
    currentChatId = null;
    loadChatHistory(peerId, dateStr);
  }
}

function clearDateFilter() {
  document.getElementById('chat-date-filter').value = '';
  const peerId = document.getElementById('recipient').value;
  if (peerId) {
    currentChatId = null;
    loadChatHistory(peerId);
  }
}

function updateOnlineStatus() {
  const selectedId = document.getElementById('recipient').value;
  const statusEl = document.getElementById('chat-status');

  if (!statusEl) return;

  if (onlineUsers.includes(selectedId)) {
    statusEl.textContent = '온라인';
    statusEl.style.color = '#16a34a';
    statusEl.style.setProperty('--status-color', '#16a34a');
  } else {
    statusEl.textContent = '오프라인';
    statusEl.style.color = '#dc2626';
    statusEl.style.setProperty('--status-color', '#dc2626');
  }
}


function loadContacts() {
  Promise.all([
    fetch('/api/members').then(r => r.json()),
    fetch('/api/chat/recent_contacts').then(r => r.json()).catch(() => ({status:'ok',recent:{}}))
  ]).then(([data, recentData]) => {
      const members = Array.isArray(data) ? data : (data.members || []);
      const list = document.getElementById('contact-list');

      // 서버에서 받은 최신 메시지 시간 반영
      if (recentData.status === 'ok' && recentData.recent) {
        for (const [uid, ts] of Object.entries(recentData.recent)) {
          if (!contactLastMsg[uid]) contactLastMsg[uid] = new Date(ts).getTime();
        }
      }

      const recipient = document.getElementById('recipient');
      const sortedMembers = [...members].sort((a, b) =>
        (a.name || a.id).localeCompare((b.name || b.id), 'ko')
      );

      recipient.innerHTML = `
        <option value="">수신자 선택</option>
        <option value="all">전체</option>
        ${sortedMembers.map(m => `
          <option value="${m.id}">${m.name || m.id}</option>
        `).join('')}
      `;

      const me = sortedMembers.find(m => m.id === currentUserId);
      const others = sortedMembers.filter(m => m.id !== currentUserId);

      // 최신 메시지 순 정렬
      others.sort((a, b) => {
        const ta = contactLastMsg[a.id] || 0;
        const tb = contactLastMsg[b.id] || 0;
        if (tb !== ta) return tb - ta;
        return (a.name || a.id).localeCompare((b.name || b.id), 'ko');
      });

      // 내 프로필 이미지
      const myProImg = me && me.profile_img ? me.profile_img : '';
      if (me && me.profile_img) _myProfile = me.profile_img;

      list.innerHTML = `
        <div class="contact-item" onclick="selectContact(this,'all','전체 공지','브로드캐스트','')">
          <div class="contact-avatar" style="background:#f3e8ff;color:#7c3aed">전</div>
          <div class="contact-info">
            <div class="contact-name">전체 공지</div>
            <div class="contact-role">브로드캐스트</div>
          </div>
        </div>

        ${me ? `
        <div class="contact-item active" onclick="selectContact(this,'${me.id}','나','나와의 채팅','${myProImg}')">
          <div class="contact-avatar" style="background:#e0e7ff;color:#3730a3;overflow:hidden;">
            ${myProImg ? `<img src="${myProImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '나'}
          </div>
          <div class="contact-info">
            <div class="contact-name">나</div>
            <div class="contact-role">나와의 채팅</div>
          </div>
        </div>
        ` : ''}

        ${others.map(m => {
  const [bg, fg] = getColor(m.id);
  const proImg = m.profile_img || '';

  return `
  <div class="contact-item" data-user-id="${m.id}" onclick="selectContact(this,'${m.id}','${m.name || m.id}','${m.position || ''}','${proImg}')">
    <div class="contact-avatar" style="background:${bg};color:${fg};overflow:hidden;">
      ${proImg ? `<img src="${proImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (m.name || m.id)[0]}
    </div>
    <div class="contact-info">
      <div class="contact-name">${m.name || m.id}</div>
      <div class="contact-role">${m.position || ''}</div>
    </div>
  </div>`;
}).join('')}
      `;

      

      if (me) {
        document.getElementById('recipient').value = me.id;
        document.getElementById('chat-name').textContent = '나';
        updateHeaderAvatar('나', myProImg);
        loadChatHistory(me.id);
        updateOnlineStatus();
      }
    });
}

function getColor(id) {
  const colors = [
    ['#dbeafe', '#1d4ed8'],
    ['#dcfce7', '#16a34a'],
    ['#fef3c7', '#d97706'],
    ['#fee2e2', '#dc2626'],
    ['#ede9fe', '#7c3aed']
  ];
  let sum = 0;
  for (let i = 0; i < id.length; i++) {
    sum += id.charCodeAt(i);
  }
  return colors[sum % colors.length];
}

window.onload = function() {
  loadContacts();

    updateOnlineStatus();
  }

window.lastDateKey = null;


</script>
